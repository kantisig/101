<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kantiverse | University Lectures</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* --- 1. ระบบ Variable สำหรับสลับสี --- */
        :root {
            --primary-blue: #1e3a8a; 
            --accent-blue: #3b82f6;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border-color: #e2e8f0;
        }

        [data-theme="dark"] {
            --primary-blue: #60a5fa; 
            --accent-blue: #3b82f6;
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-main: #f1f5f9;
            --text-sub: #94a3b8;
            --border-color: #444;
        }

        body {
            font-family: 'Sarabun', 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        /* ปุ่มสลับโหมด (ใส่ไว้เพื่อให้กดจากหน้านี้ได้ด้วย) */
        #theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--accent-blue);
            background: var(--card-bg);
            color: var(--text-main);
            cursor: pointer;
            font-size: 0.85rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .container {
            width: 90%;
            max-width: 500px;
            text-align: center;
            padding: 40px 0;
        }

        .header-box {
            margin-bottom: 30px;
        }

        .header-box h1 {
            font-size: 2rem;
            color: var(--primary-blue);
            margin: 0;
            letter-spacing: -0.5px;
        }

        .lecture-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            transition: all 0.3s ease;
            border: 1px solid var(--border-color);
        }

        .lecture-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }

        .subject-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--text-main);
            display: block;
        }

        .download-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: var(--primary-blue);
            color: #ffffff;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 500;
            transition: background 0.2s;
        }

        [data-theme="dark"] .download-link {
            color: #000; /* ในโหมดมืด ปุ่มสีสว่างขึ้น ตัวอักษรควรเข้ม */
            background-color: var(--primary-blue);
        }

        .download-link:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        /* --- ปรับปรุงปุ่ม Go Back ให้กะทัดรัดพอดีข้อความ --- */
        .back-btn-container {
            margin-top: 40px;
            text-align: center;
        }

        .back-btn {
            background-color: #95a5a6;
            border: none;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: inline-block; /* ทำให้กว้างเท่าเนื้อหา */
        }

        .back-btn:hover {
            background-color: #7f8c8d;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        .back-btn a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            display: block;
            padding: 10px 25px; /* ปรับขนาดให้เล็กลงกะทัดรัด */
        }

        .file-icon {
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <button id="theme-toggle">🌓 Switch Mode</button>

    <div class="container">
        <div class="header-box">
            <h1>University Courses</h1>
            <p style="color: var(--text-sub);">รวบรวมเลกเชอร์ระดับมหาวิทยาลัย</p>
        </div>

        <div class="lecture-card">
            <span class="subject-title">Integral</span>
            <a href="https://drive.google.com/file/d/1FIkZRfw_OsHrv6BW5Grwnc2y-StgGNKM/view?usp=drive_link" class="download-link" target="_blank">
                 Problem
            </a>
        </div>

        <div class="lecture-card">
            <span class="subject-title">ODE Order 1</span>
            <a href="https://drive.google.com/file/d/1GILqhhvzXh1Y-eEn_QkeC_bEu3wWlFts/view?usp=sharing" class="download-link" target="_blank">
                 Lecture Note
            </a>
        </div>

        <div class="back-btn-container">
            <button class="back-btn">
                <a href="index.html">← Go Back</a>
            </button>
        </div>
    </div>

    <script>
        const toggleBtn = document.getElementById('theme-toggle');
        
        function applyTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        }

        applyTheme();

        toggleBtn.addEventListener('click', () => {
            let currentTheme = document.documentElement.getAttribute('data-theme');
            let newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });
    </script>
</body>
</html>
