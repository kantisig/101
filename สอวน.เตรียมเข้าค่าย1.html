<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kantiverse | Pre POSN Camp 1</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333;
            --text-sub: #7f8c8d;
            --link-bg: #f8f9fa;
            --link-border: #eee;
        }

        [data-theme="dark"] {
            --primary-color: #ecf0f1;
            --accent-color: #5dade2;
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --text-sub: #bdc3c7;
            --link-bg: #3d3d3d;
            --link-border: #444;
        }

        body {
            font-family: 'Sarabun', 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        #theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--accent-color);
            background: var(--card-bg);
            color: var(--text-color);
            cursor: pointer;
            font-size: 0.85rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .container {
            width: 90%;
            max-width: 600px;
            margin: 40px auto;
        }

        .subject-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            text-align: center;
            transition: transform 0.3s ease;
            border: 1px solid var(--link-border);
        }

        .subject-card:hover {
            transform: translateY(-5px);
        }

        h1 {
            color: var(--primary-color);
            font-size: 1.8rem;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--accent-color);
            display: inline-block;
            padding-bottom: 5px;
        }

        h3 {
            font-size: 0.9rem;
            color: var(--text-sub);
            margin-top: 20px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .link-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }

        .math-link {
            display: block;
            padding: 12px;
            background: var(--link-bg);
            color: var(--accent-color);
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid var(--link-border);
        }

        .math-link:hover {
            background: var(--accent-color);
            color: white;
            transform: scale(1.02);
        }

        .back-btn-container {
            margin-top: 30px;
            text-align: center;
        }

        .back-btn {
            background-color: #95a5a6;
            border-radius: 50px;
            display: inline-block;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .back-btn a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            display: block;
            padding: 10px 30px;
        }

        .back-btn:hover {
            background-color: #7f8c8d;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <button id="theme-toggle">🌓 Switch Mode</button>

    <div class="container">
        <div class="subject-card">
            <h1>Algebra</h1>
            <h3>Lecture Notes</h3>
            <div class="link-group">
                <a href="https://drive.google.com/file/d/1i6vqGYlOKqA_HxWRDWtIuO0F_0PE8-Zo/view?usp=sharing" class="math-link" target="_blank">
                    Elementary Algebra
                </a>
                <h3>Practice Problems</h3>
                <a href="https://drive.google.com/file/d/1q1xadrmR8P07Xf9MUxaq0nwehZ8RTwbI/view?usp=drive_link" class="math-link" target="_blank">
                     Problem Set
                </a>
            </div>
        </div>

        <div class="subject-card">
            <h1>Geometry</h1>
            
            <h3>Lecture Notes</h3>
            <div class="link-group">
                <a href="https://drive.google.com/file/d/1e0DJBSua50ZZeaxcP2AgyyM3y3UQ0Eg6/view?usp=sharing" class="math-link" target="_blank">
                     Lecture
                </a>
            </div>

            <h3>Practice Problems</h3>
            <div class="link-group">
                <a href="https://drive.google.com/file/d/14RDSti6rBg-Cth5cN_Ts_7POnC4jsY4f/view?usp=drive_link" class="math-link" target="_blank">
                     Problem I
                </a>
            </div>
        </div>

        <div class="back-btn-container">
            <div class="back-btn">
                <a href="index.html">← Go Back </a>
            </div>
        </div>
    </div>

    <script>
        const toggleBtn = document.getElementById('theme-toggle');
        
        function applyTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        }

        applyTheme();

        toggleBtn.addEventListener('click', () => {
            let currentTheme = document.documentElement.getAttribute('data-theme');
            let newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });
    </script>
</body>
</html>
