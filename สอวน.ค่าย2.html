<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kantiverse | POSN Camp 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* --- 1. ระบบ Theme (Variables) --- */
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e74c3c;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --btn-bg: #f1f5f9;
            --btn-border: #e2e8f0;
            --exam-gradient: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
        }

        [data-theme="dark"] {
            --primary-color: #ecf0f1;
            --accent-color: #ff6b6b;
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --btn-bg: #3d3d3d;
            --btn-border: #444;
            --exam-gradient: linear-gradient(135deg, #1e293b 0%, #2c3e50 100%);
        }

        body {
            font-family: 'Sarabun', 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            line-height: 1.6;
            transition: all 0.3s ease;
        }

        /* ปุ่มสลับโหมด */
        #theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--accent-color);
            background: var(--card-bg);
            color: var(--text-main);
            cursor: pointer;
            font-size: 0.85rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 1000px;
            margin: auto;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header h1 {
            font-size: 2.8rem;
            color: var(--primary-color);
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Subject Grid */
        .subject-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .subject-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            text-align: center;
            border-top: 6px solid var(--primary-color);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .subject-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }

        .subject-card h2 {
            font-size: 1.5rem;
            color: var(--primary-color);
            margin-bottom: 20px;
            font-weight: 600;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn-link {
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: 0.2s;
            background: var(--btn-bg);
            color: var(--text-main);
            border: 1px solid var(--btn-border);
        }

        .btn-link:hover {
            background: var(--primary-color);
            color: var(--bg-color);
        }

        /* Exam Section */
        .exam-section {
            background: var(--exam-gradient);
            color: white;
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .exam-section h2 {
            color: white; /* บังคับให้หัวข้อในส่วนนี้เป็นสีขาวเสมอ */
        }

        .exam-btn {
            display: inline-block;
            background: var(--accent-color);
            color: white;
            text-decoration: none;
            padding: 14px 35px;
            border-radius: 50px;
            font-weight: 700;
            margin-top: 15px;
            transition: 0.3s;
        }

        .exam-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
        }

        /* --- ปุ่ม Go Back สไตล์เดียวกับหน้ารูท --- */
        .back-btn-container {
            text-align: center;
            margin-top: 40px;
        }

        .back-btn {
            background-color: #95a5a6;
            border: none;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: inline-block;
        }

        .back-btn a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            display: block;
            padding: 10px 30px;
        }

        .back-btn:hover {
            background-color: #7f8c8d;
            transform: translateY(-2px);
        }

        .empty-state {
            color: var(--text-muted);
            font-style: italic;
            font-size: 0.9rem;
            background: var(--btn-bg);
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <button id="theme-toggle">🌓 Switch Mode</button>

    <div class="container">
        <div class="header">
            <h1>POSN Camp 2</h1>
            <p>เอกสารประกอบการเรียนและคลังโจทย์สำหรับค่าย 2</p>
        </div>

        <div class="subject-grid">
            <div class="subject-card">
                <h2>Number Theory</h2>
                <p class="empty-state"> Coming soon</p>
            </div>

            <div class="subject-card">
                <h2>Geometry</h2>
                <div class="btn-group">
                    <a href="https://drive.google.com/file/d/1NJ-e7Z4FiKDU0IaaLg1A54Wwg1fdZKQ3/view?usp=sharing" class="btn-link" target="_blank"> Lecture</a>
                </div>
            </div>

            <div class="subject-card">
                <h2>Combinatorics</h2>
                <p class="empty-state"> Coming soon</p>
            </div>

            <div class="subject-card">
                <h2>Functional Equation</h2>
                <div class="btn-group">
                    <a href="https://drive.google.com/file/d/1Ni9uEarf3yB5DQV3pfCKo316uaXhUIEm/view?usp=drive_link" class="btn-link" target="_blank"> Lecture</a>
                    <a href="https://drive.google.com/file/d/1Kif3iDoxXCNC7uCzOlaesJerGKpQRpca/view?usp=drive_link" class="btn-link" target="_blank"> Problem</a>
                </div>
            </div>

            <div class="subject-card">
                <h2>Inequality</h2>
                <div class="btn-group">
                    <a href="https://drive.google.com/file/d/12GyWyMwGaIG9DTXPyR9GvSD0hjzSRRWz/view?usp=sharing" class="btn-link" target="_blank">Lecture</a>
                </div>
            </div>
        </div>

        <div class="back-btn-container">
            <div class="back-btn">
                <a href="index.html">← Go Back</a>
            </div>
        </div>
    </div>

    <script>
        const toggleBtn = document.getElementById('theme-toggle');
        
        function applyTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        }

        applyTheme();

        toggleBtn.addEventListener('click', () => {
            let currentTheme = document.documentElement.getAttribute('data-theme');
            let newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });
    </script>
</body>
</html>
